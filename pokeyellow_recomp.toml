# Recompile the EXTENDED (full Johto dex, 251-Pokemon) Pokemon Yellow ROM with
# gbrecomp: pret decomp -> inject Gen2 content -> ROM -> static recompile ->
# native runner. The ROM is built locally from pret (see README); nothing
# copyrighted is distributed, so there is no BPS / shipped binary.
[rom]
path = "pokeyellow/pokeyellow.gbc"        # the injected ROM (build it first)
output_dir = "recomp"
runtime_dir = "../gb-recompiled/runtime"  # relative to the generated dir (recomp/)
# The prefix tags every derived filename (Pokemon_Yellow_Extended.exe and its
# save Pokemon_Yellow_Extended.sav) so the EXTENDED build never collides with the
# STOCK build (pokeyellow_stock_recomp.toml -> Pokemon_Yellow_Stock.*).
output_prefix = "Pokemon_Yellow_Extended"

[options]
aggressive_scan = true
emit_comments = true
# No CRC hooks -> the launcher verifies the runtime ROM against the SHA-256
# the recompiler embeds from this exact ROM (so run it with the same .gbc).
